<!DOCTYPE html>
<html lang="es">
<head>
    <link
    rel="icon"
    type="image/x-icon"
    href="{{ url_for('static', filename='favicon.png') }}"
>
    <meta charset="UTF-8">
    <title>Editar producto - SmartGastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-page">

    <div class="login-card">

        <div class="login-logo">🥗 SmartGastro</div>

        <h1>Editar producto</h1>

        <p class="login-subtitle">
            Modificá los datos del producto seleccionado
        </p>

        <form action="/productos/actualizar/{{ producto.id }}" method="POST">

            <label>Nombre</label>
            <input type="text" name="nombre" value="{{ producto.nombre }}" required>

            <br><br>

            <label>Precio</label>
            <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required>

            <br><br>

            <label>Stock</label>
            <input type="number" name="stock" value="{{ producto.stock }}" required>

            <br><br>

            <button class="btn btn-primary login-button" type="submit">
                Guardar cambios
            </button>

        </form>

        <br>

        <a class="btn btn-blue login-button" href="/">
            Volver al dashboard
        </a>

    </div>

</div>

</body>
</html>
